<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customer Feedback</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>JAI KAPEES INFRACON</h1>
     <h3>Customer Feedback Form</h3>
  <div class="card">

        <label>Order Number <span>*</span></label>

        <input
            type="text"
            id="orderNo"
            placeholder="Enter Order Number">

        <br><br>

        <h2>How would you rate us?</h2>

        <div class="emoji-container">

            <span class="emoji" data-rating="1">🤩</span> 

            <span class="emoji" data-rating="3">😐</span>
                                                                     
            <span class="emoji" data-rating="4">☹️</span>
            
            </div>

        <p id="ratingText"></p>

        <br>

        <label>

        One Thing You liked About Our Service?

        </label>

        <textarea

            id="experience"

            rows="4"

            placeholder="Write your experience...">

        </textarea>

        <br><br>

        <label>

            Area You Want Us to Improve?

        </label>

        <textarea

            id="improve"

            rows="4"

            placeholder="Your valuable suggestion...">

        </textarea>

        <br>

        <div class="note">

            💡

            <b>

            Your valuable suggestions help us improve our products and services.

            </b>

            <br><br>

            🏆

            Top 3 valuable suggestions every month

            will receive exciting rewards.

        </div>

        <br>

        <button id="submitBtn">

            Submit Feedback

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
