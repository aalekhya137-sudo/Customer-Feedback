<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch & Win</title>

    <link rel="stylesheet" href="scratch.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>🎁</h1>

        <h2>JAI KAPEES INFRACON</h2>

        <h3>Scratch & Win Reward</h3>

        <p class="message">
            Thank you for sharing your valuable feedback.
            <br><br>
            Scratch the card below to reveal your reward.
        </p>

        <div class="scratch-card">

            <div id="reward" class="reward">

                <h2>🎉 Congratulations 🎉</h2>

                <h1 id="prize">₹100 Discount</h1>

                <p>
                    Show this reward while placing your next order.
                </p>

            </div>

            <canvas id="scratchCanvas"></canvas>

        </div>

        <button id="claimBtn">
            Claim Reward
        </button>

    </div>

</div>

<script src="scratch.js"></script>

</body>
</html>
